name: Deploy songs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'songs/**'
      - 'src/**'
      - 'tools/build-site.js'
      - 'tools/gallery.html'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Validate every song, then build the static gallery into ./site.
      - name: Validate songs
        run: node tools/validate.js

      - name: Build site
        run: node tools/build-site.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
