name: Deploy songs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'songs/**'
      - 'src/**'
      - 'tools/build-site.js'
      - 'tools/gh-pages.sh'
      - 'tools/gallery.html'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Push the built site to the gh-pages branch.
permissions:
  contents: write

# Serialize every writer to the gh-pages branch (this workflow and PR previews)
# so their pushes never race.
concurrency:
  group: gh-pages-branch
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate songs
        run: node tools/validate.js

      - name: Build site
        run: node tools/build-site.js

      - name: Publish to gh-pages (site root)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tools/gh-pages.sh publish
