<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>music-machine · songs</title>
  <style>
    :root {
      --bg: #12131a; --panel: #1c1e29; --ink: #e7e9f0; --muted: #8b8fa3;
      --accent: #7c8cff; --accent-2: #4ad6a0; --line: #2a2d3d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font: 15px/1.55 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      background: var(--bg); color: var(--ink); padding: 32px 20px;
    }
    .wrap { max-width: 820px; margin: 0 auto; }
    header { margin-bottom: 26px; }
    h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: 0.02em; }
    h1 .mm { color: var(--accent); }
    .sub { color: var(--muted); font-size: 13px; }
    .sub a { color: var(--accent); }
    .card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
      padding: 16px 18px; margin-bottom: 14px;
    }
    .card.playing { border-color: var(--accent); }
    .card h2 { font-size: 16px; margin: 0 0 2px; }
    .card .meta { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
    .controls { display: flex; align-items: center; gap: 10px; }
    button {
      font: inherit; background: #262a3a; color: var(--ink);
      border: 1px solid var(--line); border-radius: 7px; padding: 6px 14px; cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #10121c; border-color: var(--accent); font-weight: 600; }
    button:disabled { opacity: 0.45; cursor: default; }
    .progress { flex: 1; height: 8px; background: #0e0f16; border: 1px solid var(--line); border-radius: 5px; overflow: hidden; }
    .progress .fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    .toggle { background: none; border: none; color: var(--muted); padding: 8px 0 0; cursor: pointer; font: inherit; }
    .toggle:hover { color: var(--accent); }
    pre {
      margin: 8px 0 0; padding: 12px; background: #0e0f16; border: 1px solid var(--line);
      border-radius: 8px; overflow-x: auto; font-size: 13px; line-height: 1.6; display: none;
    }
    pre.open { display: block; }
    .empty { color: var(--muted); }
    footer { color: var(--muted); font-size: 12px; margin-top: 28px; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1><span class="mm">music-machine</span> · songs</h1>
      <div class="sub">
        Version-controlled songs, played in your browser. Press ▶ on any song.
        &nbsp;·&nbsp; <a href="https://github.com/PureMunky/music-machine">source &amp; format</a>
      </div>
    </header>

    <div id="list"></div>

    <footer>Built from the repo's <code>songs/</code> directory &middot; audio via the Web Audio API, no plugins.</footer>
  </div>

  <script src="song.js"></script>
  <script src="engine.js"></script>
  <script src="songs.js"></script>
  <script>
    var MM = window.MusicMachine;
    var engine = new window.MusicMachineEngine.AudioEngine();
    var listEl = document.getElementById('list');
    var songs = window.SONGS || [];
    var current = null; // the card currently playing

    function fmtDuration(song) {
      var beats = 0;
      for (var t = 0; t < song.tracks.length; t++) {
        var b = 0;
        for (var e = 0; e < song.tracks[t].events.length; e++) b += song.tracks[t].events[e].beats;
        if (b > beats) beats = b;
      }
      return (beats * 60 / song.tempo);
    }

    function countNotes(song) {
      var n = 0;
      for (var t = 0; t < song.tracks.length; t++)
        for (var e = 0; e < song.tracks[t].events.length; e++)
          if (song.tracks[t].events[e].type !== 'rest') n++;
      return n;
    }

    if (!songs.length) {
      listEl.innerHTML = '<p class="empty">No songs found in the repo yet.</p>';
    }

    songs.forEach(function (entry) {
      var song = MM.parseSong(entry.source);

      var card = document.createElement('div');
      card.className = 'card';

      var h2 = document.createElement('h2');
      h2.textContent = song.title;

      var meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent =
        entry.file + ' · ' + song.tracks.length + ' track(s) · ' +
        countNotes(song) + ' notes · ' + song.tempo + ' BPM · ~' +
        fmtDuration(song).toFixed(1) + 's';

      var controls = document.createElement('div');
      controls.className = 'controls';

      var playBtn = document.createElement('button');
      playBtn.className = 'primary';
      playBtn.textContent = '▶ Play';

      var stopBtn = document.createElement('button');
      stopBtn.textContent = '■';
      stopBtn.disabled = true;

      var progress = document.createElement('div');
      progress.className = 'progress';
      var fill = document.createElement('div');
      fill.className = 'fill';
      progress.appendChild(fill);

      controls.appendChild(playBtn);
      controls.appendChild(stopBtn);
      controls.appendChild(progress);

      var toggle = document.createElement('button');
      toggle.className = 'toggle';
      toggle.textContent = '▸ show source';

      var pre = document.createElement('pre');
      pre.textContent = entry.source;

      toggle.addEventListener('click', function () {
        var open = pre.classList.toggle('open');
        toggle.textContent = (open ? '▾ hide' : '▸ show') + ' source';
      });

      var ctx = { card: card, playBtn: playBtn, stopBtn: stopBtn, fill: fill };

      function reset() {
        playBtn.disabled = false;
        stopBtn.disabled = true;
        fill.style.width = '0%';
        card.classList.remove('playing');
      }

      playBtn.addEventListener('click', function () {
        if (current && current !== ctx) current.reset();
        current = ctx;
        engine.play(song, {
          onProgress: function (pct) { fill.style.width = (pct * 100) + '%'; },
          onEnd: reset
        });
        playBtn.disabled = true;
        stopBtn.disabled = false;
        card.classList.add('playing');
      });

      stopBtn.addEventListener('click', function () { engine.stop(); reset(); });
      ctx.reset = reset;

      card.appendChild(h2);
      card.appendChild(meta);
      card.appendChild(controls);
      card.appendChild(toggle);
      card.appendChild(pre);
      listEl.appendChild(card);
    });
  </script>
</body>
</html>
